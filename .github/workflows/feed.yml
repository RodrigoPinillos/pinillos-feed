name: Actualizar feed Google Merchant

on:
  schedule:
    - cron: '0 6 * * 1'      # todos los lunes 06:00 UTC (~03:00 Argentina)
  workflow_dispatch:           # permite ejecutarlo a mano desde la pestaña Actions

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generar feed principal (scrapea pinillos.com.ar en vivo)
        run: python3 build_feed.py google_merchant_feed_pinillos.tsv

      - name: Generar feed de inventario local
        env:
          STORE_CODE: Tienda-Pinillos
        run: python3 build_local_inventory.py local_inventory_feed_pinillos.tsv

      - name: Commit de los feeds si cambiaron
        run: |
          git config user.name  "feed-bot"
          git config user.email "feed-bot@users.noreply.github.com"
          git add google_merchant_feed_pinillos.tsv local_inventory_feed_pinillos.tsv
          if git diff --staged --quiet; then
            echo "Sin cambios en los feeds."
          else
            git commit -m "Actualiza feeds $(date -u +%F)"
            git push
          fi
